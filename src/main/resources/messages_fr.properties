# --- About ---
about.text=\uD83D\uDC68\u200D\uD83D\uDCBB Bonjour de la part du D\u00E9veloppeur !\n\nMerci d''utiliser le bot Meal Planner ! J''ai con\u00E7u ce bot avec Java & Spring Boot pour aider les gens \u00E0 trouver de superbes recettes, quelle que soit leur langue.\n\nSi vous avez des commentaires, si vous avez trouv\u00E9 un bug ou si vous souhaitez discuter du d\u00E9veloppement de bots personnalis\u00E9s, n''h\u00E9sitez pas \u00E0 me contacter. Si vous aimez ce bot, un caf\u00E9 est toujours appr\u00E9ci\u00E9 ! \u2615\uFE0F