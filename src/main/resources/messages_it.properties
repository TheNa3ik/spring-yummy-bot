# --- About ---
about.text=\uD83D\uDC68\u200D\uD83D\uDCBB Ciao dallo Sviluppatore!\n\nGrazie per aver usato il bot Meal Planner! Ho creato questo bot usando Java e Spring Boot per aiutare le persone a trovare fantastiche ricette, indipendentemente dalla lingua che parlano.\n\nSe hai feedback, hai trovato un bug o vuoi parlare dello sviluppo di bot personalizzati, non esitare a contattarmi. Se il bot ti piace, un caff\u00E8 \u00E8 sempre gradito! \u2615\uFE0F