# --- About ---
about.text=\uD83D\uDC68\u200D\uD83D\uDCBB Ol\u00E1 do Desenvolvedor!\n\nObrigado por usar o bot Meal Planner! Constru\u00ED este bot usando Java e Spring Boot para ajudar as pessoas a encontrarem \u00F3timas receitas, n\u00E3o importa o idioma que falem.\n\nSe voc\u00EA tiver feedback, encontrar um bug ou quiser conversar sobre o desenvolvimento de bots personalizados, fique \u00E0 vontade para entrar em contato. Se voc\u00EA gostou do bot, um caf\u00E9 \u00E9 sempre bem-vindo! \u2615\uFE0F