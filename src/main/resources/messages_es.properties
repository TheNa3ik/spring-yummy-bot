# --- Welcome & Start ---
start.welcome.text=\uD83D\uDC4B *\u00A1Hola, {0}!*\n\u00A1Bienvenido a Yummy Bot, tu asistente personal de recetas!\n\nEstoy aqu\u00ED para ayudarte a:\n\n\uD83C\uDF73 Descubrir recetas e ideas de comidas incre\u00EDbles\n\uD83E\uDD57 Personalizar las b\u00FAsquedas para adaptarlas a tu dieta\n\uD83C\uDF0D Traducir recetas a tu idioma usando IA inteligente\n\n\uD83D\uDCA1 *Consejo:* \u00A1Usa el men\u00FA de abajo para comenzar tu primera b\u00FAsqueda, o ve a Configuraci\u00F3n para ajustar tus preferencias!
start.welcome.new=\uD83C\uDF4A \u00A1Encontremos tu comida perfecta!\nPrimero, elige tu preferencia de dieta a continuaci\u00F3n \uD83D\uDC47
