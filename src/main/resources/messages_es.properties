# --- About ---
about.text=\uD83D\uDC68\u200D\uD83D\uDCBB \u00A1Hola del Desarrollador!\n\n\u00A1Gracias por usar Yummy Bot! Constru\u00ED este proyecto usando Java y Spring Boot para que descubrir y traducir recetas sea f\u00E1cil para todos.\n\nSi tienes comentarios, encontraste un error o quieres hablar sobre el desarrollo de bots personalizados, no dudes en contactarme. Si te encanta el bot, \u00A1un caf\u00E9 virtual para mantener el c\u00F3digo fluyendo siempre es bienvenido! \u2615\uFE0F