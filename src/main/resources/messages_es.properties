# --- About ---
about.text=\uD83D\uDC68\u200D\uD83D\uDCBB \u00A1Hola del Desarrollador!\n\n\u00A1Gracias por usar el bot Meal Planner! Constru\u00ED este bot usando Java y Spring Boot para ayudar a las personas a encontrar excelentes recetas, sin importar el idioma que hablen.\n\nSi tienes comentarios, encontraste un error o quieres hablar sobre el desarrollo de bots personalizados, no dudes en contactarme. Si te encanta el bot, \u00A1un caf\u00E9 siempre es bienvenido! \u2615\uFE0F