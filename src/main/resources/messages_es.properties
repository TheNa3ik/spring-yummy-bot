# --- Search Flow ---
flow.search.prompt.ingredients=\uD83D\uDED2 *B\u00FAsqueda de Ingredientes*\n\nEscribe los ingredientes que tienes a mano, separados por comas.\n\n*(Ejemplo: chicken, rice, broccoli)* \u270F\uFE0F
flow.search.prompt.name=\uD83E\uDD58 *B\u00FAsqueda por Nombre*\n\nIngresa el nombre del plato que te gustar\u00EDa cocinar hoy.\n\n*(Ejemplo: Pasta Carbonara, Beef Tacos, Sushi)* \u270F\uFE0F
flow.search.prompt.random=\uD83C\uDFB2 *B\u00FAsqueda Aleatoria*\n\n\u00A1Espera un momento! Estoy eligiendo una deliciosa sorpresa para ti... \uD83D\uDC47
flow.search.success=\uD83D\uDD0D *B\u00FAsqueda Completada*\n\n\u00A1Aqu\u00ED tienes una deliciosa receta que encontr\u00E9 basada en tu petici\u00F3n! \uD83D\uDC47
flow.search.error.first_page=\u00A1Ya est\u00E1s en la primera p\u00E1gina! \uD83D\uDED1
flow.search.error.no_results=\uD83D\uDE15 *\u00A1No se encontraron recetas!*\n\nIntenta buscar con ingredientes diferentes.
flow.search.error.end_of_list=\uD83D\uDE15 \u00A1Eso es todo por ahora!\n\nNo se encontraron m\u00E1s recetas para esta b\u00FAsqueda.
flow.search.btn.prev=\u2B05\uFE0F Anterior
