# --- About ---
about.text=\uD83D\uDC68\u200D\uD83D\uDCBB Hello from the Developer!\n\nThanks for using Yummy Bot! I built this project using Java & Spring Boot to make discovering and translating recipes easy for everyone.\n\nIf you have feedback, found a bug, or want to chat about custom bot development, feel free to reach out. If you love the bot, a virtual coffee to keep the code flowing is always highly appreciated! \u2615\uFE0F