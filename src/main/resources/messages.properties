about.text=\uD83D\uDC68\u200D\uD83D\uDCBB Hello from the Developer!\n\nThanks for using the Meal Planner bot! I built this using Java & Spring Boot to help people find great recipes no matter what language they speak.\n\nIf you have feedback, found a bug, or want to talk about custom bot development, feel free to reach out. If you love the bot, a coffee is always appreciated! \u2615\uFE0F
