# --- Welcome & Start ---
start.welcome.text=\uD83D\uDC4B *Ol\u00E1, {0}!*\nBem-vindo ao Yummy Bot, seu assistente pessoal de receitas!\n\nEstou aqui para ajudar voc\u00EA a:\n\n\uD83C\uDF73 Descobrir receitas e ideias de refei\u00E7\u00F5es incr\u00EDveis\n\uD83E\uDD57 Personalizar buscas para atender \u00E0s suas necessidades diet\u00E9ticas\n\uD83C\uDF0D Traduzir receitas para o seu idioma usando IA inteligente\n\n\uD83D\uDCA1 *Dica:* Use o menu abaixo para iniciar sua primeira busca ou v\u00E1 para Configura\u00E7\u00F5es para ajustar suas prefer\u00EAncias!
start.welcome.new=\uD83C\uDF4A Vamos encontrar sua refei\u00E7\u00E3o perfeita!\nPrimeiro, escolha sua prefer\u00EAncia de dieta abaixo \uD83D\uDC47
start.welcome.back=\uD83D\uDC4B *Bem-vindo de volta, {0}!*\n\n\uD83C\uDF4A Vamos encontrar sua pr\u00F3xima refei\u00E7\u00E3o!

