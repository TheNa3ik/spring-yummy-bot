# --- About ---
about.text=\uD83D\uDC68\u200D\uD83D\uDCBB Ol\u00E1 do Desenvolvedor!\n\nObrigado por usar o Yummy Bot! Constru\u00ED este projeto usando Java e Spring Boot para tornar a descoberta e tradu\u00E7\u00E3o de receitas f\u00E1cil para todos.\n\nSe voc\u00EA tiver feedback, encontrar um bug ou quiser conversar sobre o desenvolvimento de bots personalizados, fique \u00E0 vontade para entrar em contato. Se voc\u00EA gostou do bot, um caf\u00E9 virtual para manter o c\u00F3digo fluindo \u00E9 sempre muito apreciado! \u2615\uFE0F