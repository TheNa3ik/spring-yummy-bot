# --- Search Flow ---
flow.search.prompt.ingredients=\uD83D\uDED2 *Busca por Ingredientes*\n\nDigite os ingredientes que voc\u00EA tem em m\u00E3os, separados por v\u00EDrgulas.\n\n*(Exemplo: chicken, rice, broccoli)* \u270F\uFE0F
flow.search.prompt.name=\uD83E\uDD58 *Busca por Nome*\n\nDigite o nome do prato que voc\u00EA gostaria de cozinhar hoje.\n\n*(Exemplo: Pasta Carbonara, Beef Tacos, Sushi)* \u270F\uFE0F
flow.search.prompt.random=\uD83C\uDFB2 *Busca Aleat\u00F3ria*\n\nS\u00F3 um minuto! Estou escolhendo uma surpresa deliciosa para voc\u00EA... \uD83D\uDC47
flow.search.success=\uD83D\uDD0D *Busca Conclu\u00EDda*\n\nAqui est\u00E1 uma receita deliciosa que encontrei com base no seu pedido! \uD83D\uDC47
flow.search.error.first_page=Voc\u00EA j\u00E1 est\u00E1 na primeira p\u00E1gina! \uD83D\uDED1
flow.search.error.no_results=\uD83D\uDE15 *Nenhuma receita encontrada!*\n\nTente pesquisar com ingredientes diferentes.
flow.search.error.end_of_list=\uD83D\uDE15 *Isso \u00E9 tudo por enquanto!*\n\nN\u00E3o foram encontradas mais receitas para esta pesquisa.
flow.search.btn.prev=\u2B05\uFE0F Anterior
flow.search.btn.details=\uD83D\uDCD6 Ver Detalhes
flow.search.btn.next=\u27A1\uFE0F Pr\u00F3ximo

