# --- About ---
about.text=\uD83D\uDC68\u200D\uD83D\uDCBB Hallo vom Entwickler!\n\nDanke, dass du den Yummy Bot nutzt! Ich habe dieses Projekt mit Java & Spring Boot entwickelt, um das Entdecken und \u00DCbersetzen von Rezepten f\u00FCr alle einfach zu machen.\n\nWenn du Feedback hast, einen Fehler gefunden hast oder \u00FCber die Entwicklung eines eigenen Bots sprechen m\u00F6chtest, melde dich gerne. Wenn dir der Bot gef\u00E4llt, freue ich mich immer \u00FCber einen virtuellen Kaffee, um den Code am Laufen zu halten! \u2615\uFE0F