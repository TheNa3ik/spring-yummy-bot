# --- Welcome & Start ---
start.welcome.text=\uD83D\uDC4B *Hallo, {0}!*\nWillkommen beim Yummy Bot, deinem pers\u00F6nlichen Rezept-Assistenten!\n\nIch bin hier, um dir zu helfen:\n\n\uD83C\uDF73 Entdecke gro\u00DFartige Rezepte und Mahlzeiten-Ideen\n\uD83E\uDD57 Passe Suchen an deine Ern\u00E4hrungsbed\u00FCrfnisse an\n\uD83C\uDF0D \u00DCbersetze Rezepte mit smarter KI in deine Sprache\n\n\uD83D\uDCA1 *Tipp:* Nutze das Men\u00FC unten, um deine erste Suche zu starten, oder gehe zu den Einstellungen, um deine Pr\u00E4ferenzen anzupassen!
start.welcome.new=\uD83C\uDF4A Lass uns dein perfektes Gericht finden!\nBitte w\u00E4hle zuerst deine Ern\u00E4hrungsweise unten aus \uD83D\uDC47
start.welcome.back=\uD83D\uDC4B *Willkommen zur\u00FCck, {0}!*\n\n\uD83C\uDF4A Lass uns deine n\u00E4chste Mahlzeit finden!

