# --- Search Flow ---
flow.search.prompt.ingredients=\uD83D\uDED2 *Zutatensuche*\n\nTippe die Zutaten ein, die du hast, getrennt durch Kommata.\n\n*(Beispiel: chicken, rice, broccoli)* \u270F\uFE0F
flow.search.prompt.name=\uD83E\uDD58 *Namenssuche*\n\nGib den Namen des Gerichts ein, das du heute kochen m\u00F6chtest.\n\n*(Beispiel: Pasta Carbonara, Beef Tacos, Sushi)* \u270F\uFE0F
flow.search.prompt.random=\uD83C\uDFB2 *Zufallssuche*\n\nEinen Moment! Ich suche eine leckere \u00DCberraschung f\u00FCr dich aus... \uD83D\uDC47
flow.search.success=\uD83D\uDD0D *Suche abgeschlossen*\n\nHier ist ein leckeres Rezept, das ich basierend auf deiner Anfrage gefunden habe! \uD83D\uDC47
flow.search.error.first_page=Du bist bereits auf der ersten Seite! \uD83D\uDED1
flow.search.error.no_results=\uD83D\uDE15 *Keine Rezepte gefunden!*\n\nVersuche es mit anderen Zutaten.
flow.search.error.end_of_list=\uD83D\uDE15 Das war''s vorerst!\n\nKeine weiteren Rezepte f\u00FCr diese Suche gefunden.
