# --- Welcome & Start ---
start.welcome.text=\uD83D\uDC4B *Bonjour, {0} !*\nBienvenue sur Yummy Bot, votre assistant de recettes personnel !\n\nJe suis l\u00E0 pour vous aider \u00E0 :\n\n\uD83C\uDF73 D\u00E9couvrir des recettes et des id\u00E9es de repas incroyables\n\uD83E\uDD57 Personnaliser les recherches pour r\u00E9pondre \u00E0 vos besoins alimentaires\n\uD83C\uDF0D Traduire les recettes dans votre langue gr\u00E2ce \u00E0 une IA intelligente\n\n\uD83D\uDCA1 *Astuce :* Utilisez le menu ci-dessous pour lancer votre premi\u00E8re recherche, ou allez dans les Param\u00E8tres pour ajuster vos pr\u00E9f\u00E9rences !
start.welcome.new=\uD83C\uDF4A Trouvons votre repas id\u00E9al !\nTout d''abord, veuillez choisir votre r\u00E9gime alimentaire ci-dessous \uD83D\uDC47
start.welcome.back=\uD83D\uDC4B *Bon retour, {0} !*\n\n\uD83C\uDF4A Trouvons votre prochain repas !

