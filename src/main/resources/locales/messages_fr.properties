# --- Search Flow ---
flow.search.prompt.ingredients=\uD83D\uDED2 *Recherche d''ingr\u00E9dients*\n\nTapez les ingr\u00E9dients que vous avez sous la main, s\u00E9par\u00E9s par des virgules.\n\n*(Exemple : chicken, rice, broccoli)* \u270F\uFE0F
flow.search.prompt.name=\uD83E\uDD58 *Recherche par nom*\n\nEntrez le nom du plat que vous aimeriez cuisiner aujourd''hui.\n\n*(Exemple : Pasta Carbonara, Beef Tacos, Sushi)* \u270F\uFE0F
flow.search.prompt.random=\uD83C\uDFB2 *Recherche al\u00E9atoire*\n\nUn instant ! Je vous pr\u00E9pare une d\u00E9licieuse surprise... \uD83D\uDC47
flow.search.success=\uD83D\uDD0D *Recherche termin\u00E9e*\n\nVoici une d\u00E9licieuse recette que j''ai trouv\u00E9e en fonction de votre demande ! \uD83D\uDC47
flow.search.error.first_page=Vous \u00EAtes d\u00E9j\u00E0 sur la premi\u00E8re page ! \uD83D\uDED1
flow.search.error.no_results=\uD83D\uDE15 *Aucune recette trouv\u00E9e !*\n\nEssayez de chercher avec des ingr\u00E9dients diff\u00E9rents.
flow.search.error.end_of_list=\uD83D\uDE15 *C''est tout pour le moment !*\n\nPlus aucune recette trouv\u00E9e pour cette recherche.
flow.search.btn.prev=\u2B05\uFE0F Pr\u00E9c\u00E9dent
flow.search.btn.details=\uD83D\uDCD6 Voir les d\u00E9tails
flow.search.btn.next=\u27A1\uFE0F Suivant

