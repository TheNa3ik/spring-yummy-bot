# --- About ---
about.text=\uD83D\uDC68\u200D\uD83D\uDCBB Bonjour de la part du D\u00E9veloppeur !\n\nMerci d''utiliser Yummy Bot ! J''ai con\u00E7u ce projet avec Java & Spring Boot pour faciliter la d\u00E9couverte et la traduction de recettes pour tout le monde.\n\nSi vous avez des commentaires, si vous avez trouv\u00E9 un bug ou si vous souhaitez discuter du d\u00E9veloppement de bots personnalis\u00E9s, n''h\u00E9sitez pas \u00E0 me contacter. Si vous aimez ce bot, un caf\u00E9 virtuel pour faire couler le code est toujours appr\u00E9ci\u00E9 ! \u2615\uFE0F