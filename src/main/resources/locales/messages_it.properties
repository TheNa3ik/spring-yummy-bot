# --- About ---
about.text=\uD83D\uDC68\u200D\uD83D\uDCBB Ciao dallo Sviluppatore!\n\nGrazie per aver usato Yummy Bot! Ho creato questo progetto usando Java e Spring Boot per rendere facile a tutti la scoperta e la traduzione di ricette.\n\nSe hai feedback, hai trovato un bug o vuoi parlare dello sviluppo di bot personalizzati, non esitare a contattarmi. Se il bot ti piace, un caff\u00E8 virtuale per mantenere il codice attivo \u00E8 sempre gradito! \u2615\uFE0F