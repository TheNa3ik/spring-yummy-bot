# --- Search Flow ---
flow.search.prompt.ingredients=\uD83D\uDED2 *Ricerca Ingredienti*\n\nScrivi gli ingredienti che hai a disposizione, separati da virgole.\n\n*(Esempio: chicken, rice, broccoli)* \u270F\uFE0F
flow.search.prompt.name=\uD83E\uDD58 *Ricerca per Nome*\n\nInserisci il nome del piatto che vorresti cucinare oggi.\n\n*(Esempio: Pasta Carbonara, Beef Tacos, Sushi)* \u270F\uFE0F
flow.search.prompt.random=\uD83C\uDFB2 *Ricerca Casuale*\n\nAspetta un attimo! Sto scegliendo una deliziosa sorpresa per te... \uD83D\uDC47
flow.search.success=\uD83D\uDD0D *Ricerca Completata*\n\nEcco una deliziosa ricetta che ho trovato in base alla tua richiesta! \uD83D\uDC47
flow.search.error.first_page=Sei gi\u00E0 sulla prima pagina! \uD83D\uDED1
flow.search.error.no_results=\uD83D\uDE15 *Nessuna ricetta trovata!*\n\nProva a cercare con ingredienti diversi.
