# --- Welcome & Start ---
start.welcome.text=\uD83D\uDC4B *Ciao, {0}!*\nBenvenuto su Yummy Bot, il tuo assistente personale per le ricette!\n\nSono qui per aiutarti a:\n\n\uD83C\uDF73 Scoprire ricette fantastiche e idee per i pasti\n\uD83E\uDD57 Personalizzare le ricerche per adattarle alla tua dieta\n\uD83C\uDF0D Tradurre le ricette nella tua lingua usando un''IA intelligente\n\n\uD83D\uDCA1 *Consiglio:* Usa il menu qui sotto per avviare la tua prima ricerca, oppure vai su Impostazioni per regolare le tue preferenze!
start.welcome.new=\uD83C\uDF4A Troviamo il tuo pasto perfetto!\nPer prima cosa, scegli la tua preferenza di dieta qui sotto \uD83D\uDC47
start.welcome.back=\uD83D\uDC4B *Bentornato, {0}!*\n\n\uD83C\uDF4A Troviamo il tuo prossimo pasto!

