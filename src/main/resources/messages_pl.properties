# --- Welcome & Start ---
start.welcome.text=\uD83D\uDC4B *Cze\u015B\u0107, {0}!*\nWitaj w Yummy Bot, Twoim osobistym asystencie kulinarnym!\n\nJestem tu, aby Ci pom\u00F3c:\n\n\uD83C\uDF73 Odkrywa\u0107 niesamowite przepisy i pomys\u0142y na posi\u0142ki\n\uD83E\uDD57 Dostosowywa\u0107 wyszukiwania do Twoich potrzeb dietetycznych\n\uD83C\uDF0D T\u0142umaczy\u0107 przepisy na Tw\u00F3j j\u0119zyk za pomoc\u0105 inteligentnej AI\n\n\uD83D\uDCA1 *Wskaz\u00F3wka:* U\u017Cyj menu poni\u017Cej, aby rozpocz\u0105\u0107 pierwsze wyszukiwanie, lub przejd\u017A do Ustawie\u0144, aby dostosowa\u0107 swoje preferencje!
start.welcome.new=\uD83C\uDF4A Znajd\u017Amy Tw\u00F3j idealny posi\u0142ek!\nNajpierw wybierz swoje preferencje dietetyczne poni\u017Cej \uD83D\uDC47
start.welcome.back=\uD83D\uDC4B *Witaj ponownie, {0}!*\n\n\uD83C\uDF4A Znajd\u017Amy Tw\u00F3j nast\u0119pny posi\u0142ek!

