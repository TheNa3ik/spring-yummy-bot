# --- About ---
about.text=\uD83D\uDC68\u200D\uD83D\uDCBB Cze\u015B\u0107 od Dewelopera!\n\nDzi\u0119kuj\u0119 za korzystanie z Yummy Bot! Stworzy\u0142em ten projekt przy u\u017Cyciu Java i Spring Boot, aby u\u0142atwi\u0107 ka\u017Cdemu odkrywanie i t\u0142umaczenie przepis\u00F3w.\n\nJe\u015Bli masz opinie, znalaz\u0142e\u015B b\u0142\u0105d lub chcesz porozmawia\u0107 o tworzeniu niestandardowych bot\u00F3w, \u015Bmia\u0142o pisz do mnie. Je\u015Bli podoba Ci si\u0119 ten bot, wirtualna kawa na podtrzymanie pracy nad kodem jest zawsze mile widziana! \u2615\uFE0F