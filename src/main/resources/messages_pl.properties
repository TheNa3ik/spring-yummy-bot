# --- About ---
about.text=\uD83D\uDC68\u200D\uD83D\uDCBB Cze\u015B\u0107 od Dewelopera!\n\nDzi\u0119kuj\u0119 za korzystanie z bota Meal Planner! Stworzy\u0142em tego bota przy u\u017Cyciu Java i Spring Boot, aby pom\u00F3c ludziom w znajdowaniu wspania\u0142ych przepis\u00F3w, bez wzgl\u0119du na to, w jakim j\u0119zyku m\u00F3wi\u0105.\n\nJe\u015Bli masz opinie, znalaz\u0142e\u015B b\u0142\u0105d lub chcesz porozmawia\u0107 o tworzeniu niestandardowych bot\u00F3w, \u015Bmia\u0142o pisz do mnie. Je\u015Bli podoba Ci si\u0119 ten bot, kawa zawsze mile widziana! \u2615\uFE0F