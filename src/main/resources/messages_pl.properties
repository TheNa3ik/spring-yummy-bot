# --- Search Flow ---
flow.search.prompt.ingredients=\uD83D\uDED2 *Wyszukiwanie sk\u0142adnik\u00F3w*\n\nWpisz sk\u0142adniki, kt\u00F3re masz pod r\u0119k\u0105, oddzielaj\u0105c je przecinkami.\n\n*(Przyk\u0142ad: chicken, rice, broccoli)* \u270F\uFE0F
flow.search.prompt.name=\uD83E\uDD58 *Wyszukiwanie po nazwie*\n\nWpisz nazw\u0119 dania, kt\u00F3re chcia\u0142by\u015B dzisiaj ugotowa\u0107.\n\n*(Przyk\u0142ad: Pasta Carbonara, Beef Tacos, Sushi)* \u270F\uFE0F
flow.search.prompt.random=\uD83C\uDFB2 *Wyszukiwanie losowe*\n\nChwileczk\u0119! Wybieram dla Ciebie pyszn\u0105 niespodziank\u0119... \uD83D\uDC47
flow.search.success=\uD83D\uDD0D *Wyszukiwanie zako\u0144czone*\n\nOto pyszny przepis, kt\u00F3ry znalaz\u0142em na podstawie Twojej pro\u015Bby! \uD83D\uDC47
flow.search.error.first_page=Jeste\u015B ju\u017C na pierwszej stronie! \uD83D\uDED1
flow.search.error.no_results=\uD83D\uDE15 *Nie znaleziono przepis\u00F3w!*\n\nSpr\u00F3buj poszuka\u0107 z innymi sk\u0142adnikami.
flow.search.error.end_of_list=\uD83D\uDE15 *To na razie wszystko!*\n\nNie znaleziono wi\u0119cej przepis\u00F3w dla tego wyszukiwania.
flow.search.btn.prev=\u2B05\uFE0F Poprzedni
flow.search.btn.details=\uD83D\uDCD6 Poka\u017C szczeg\u00F3\u0142y
flow.search.btn.next=\u27A1\uFE0F Nast\u0119pny

