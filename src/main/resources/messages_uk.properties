# --- About ---
about.text=\uD83D\uDC68\u200D\uD83D\uDCBB \u041F\u0440\u0438\u0432\u0456\u0442 \u0432\u0456\u0434 \u0440\u043E\u0437\u0440\u043E\u0431\u043D\u0438\u043A\u0430!\n\n\u0414\u044F\u043A\u0443\u044E, \u0449\u043E \u043A\u043E\u0440\u0438\u0441\u0442\u0443\u0454\u0442\u0435\u0441\u044C Meal Planner! \u042F \u0441\u0442\u0432\u043E\u0440\u0438\u0432 \u0446\u044C\u043E\u0433\u043E \u0431\u043E\u0442\u0430 \u0437\u0430 \u0434\u043E\u043F\u043E\u043C\u043E\u0433\u043E\u044E Java \u0442\u0430 Spring Boot, \u0449\u043E\u0431 \u0434\u043E\u043F\u043E\u043C\u043E\u0433\u0442\u0438 \u043B\u044E\u0434\u044F\u043C \u0437\u043D\u0430\u0445\u043E\u0434\u0438\u0442\u0438 \u0447\u0443\u0434\u043E\u0432\u0456 \u0440\u0435\u0446\u0435\u043F\u0442\u0438 \u043D\u0435\u0437\u0430\u043B\u0435\u0436\u043D\u043E \u0432\u0456\u0434 \u0442\u043E\u0433\u043E, \u044F\u043A\u043E\u044E \u043C\u043E\u0432\u043E\u044E \u0432\u043E\u043D\u0438 \u0440\u043E\u0437\u043C\u043E\u0432\u043B\u044F\u044E\u0442\u044C.\n\n\u042F\u043A\u0449\u043E \u0443 \u0432\u0430\u0441 \u0454 \u0432\u0456\u0434\u0433\u0443\u043A\u0438, \u0432\u0438 \u0437\u043D\u0430\u0439\u0448\u043B\u0438 \u043F\u043E\u043C\u0438\u043B\u043A\u0443 \u0430\u0431\u043E \u0445\u043E\u0447\u0435\u0442\u0435 \u043E\u0431\u0433\u043E\u0432\u043E\u0440\u0438\u0442\u0438 \u0440\u043E\u0437\u0440\u043E\u0431\u043A\u0443 \u0432\u043B\u0430\u0441\u043D\u043E\u0433\u043E \u0431\u043E\u0442\u0430, \u043F\u0438\u0448\u0456\u0442\u044C \u043C\u0435\u043D\u0456. \u042F\u043A\u0449\u043E \u0432\u0430\u043C \u0441\u043F\u043E\u0434\u043E\u0431\u0430\u0432\u0441\u044F \u0431\u043E\u0442, \u044F \u0437\u0430\u0432\u0436\u0434\u0438 \u0431\u0443\u0434\u0443 \u0432\u0434\u044F\u0447\u043D\u0438\u0439 \u0437\u0430 \u043A\u0430\u0432\u0443! \u2615\uFE0F