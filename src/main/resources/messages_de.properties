# --- About ---
about.text=\uD83D\uDC68\u200D\uD83D\uDCBB Hallo vom Entwickler!\n\nDanke, dass du den Meal Planner Bot nutzt! Ich habe diesen Bot mit Java & Spring Boot entwickelt, um Leuten zu helfen, tolle Rezepte zu finden, egal welche Sprache sie sprechen.\n\nWenn du Feedback hast, einen Fehler gefunden hast oder \u00FCber die Entwicklung eines eigenen Bots sprechen m\u00F6chtest, melde dich gerne bei mir. Wenn dir der Bot gef\u00E4llt, freue ich mich immer \u00FCber einen Kaffee! \u2615\uFE0F